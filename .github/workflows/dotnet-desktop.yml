name: Build & Release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'schedule_example.json'
      - '.workbuddy/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      Solution_Name: 学程.sln
      Project_Name: 学程.csproj
      Project_Directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ env.Solution_Name }}

      - name: Build (Debug)
        run: dotnet build ${{ env.Solution_Name }} -c Debug --no-restore

      - name: Publish (Release x64)
        run: dotnet publish ${{ env.Project_Name }} -c Release -r win-x64 --self-contained true -o publish

      # ── 代码签名 ──
      - name: Import signing certificate
        if: github.event_name == 'push'
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          [System.IO.File]::WriteAllBytes("${{ env.Project_Directory }}\StudyJourney.pfx", $bytes)
        shell: pwsh

      - name: Find signtool
        if: github.event_name == 'push'
        id: find_signtool
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $signtool = Join-Path $sdk.FullName "x64\signtool.exe"
          echo "signtool_path=$signtool" >> $env:GITHUB_OUTPUT
          Write-Host "signtool: $signtool"
        shell: pwsh

      - name: Sign binaries
        if: github.event_name == 'push'
        run: |
          & "${{ steps.find_signtool.outputs.signtool_path }}" sign /fd SHA256 /f "${{ env.Project_Directory }}\StudyJourney.pfx" /p "${{ secrets.PFX_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 /v "${{ env.Project_Directory }}\publish\学程.exe"
          & "${{ steps.find_signtool.outputs.signtool_path }}" sign /fd SHA256 /f "${{ env.Project_Directory }}\StudyJourney.pfx" /p "${{ secrets.PFX_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 /v "${{ env.Project_Directory }}\publish\学程.dll"
        shell: pwsh

      - name: Verify signatures
        if: github.event_name == 'push'
        run: |
          & "${{ steps.find_signtool.outputs.signtool_path }}" verify /v "${{ env.Project_Directory }}\publish\学程.exe"
          & "${{ steps.find_signtool.outputs.signtool_path }}" verify /v "${{ env.Project_Directory }}\publish\学程.dll"
        shell: pwsh

      - name: Remove certificate
        if: always() && github.event_name == 'push'
        run: Remove-Item -Path "${{ env.Project_Directory }}\StudyJourney.pfx" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Pack zip
        run: powershell Compress-Archive -Path publish\* -DestinationPath 学程-win-x64.zip

      - name: Create Release & Upload
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: 学程 Latest
          tag_name: latest
          body: |
            自动构建 · `${{ github.sha }}`
            ${{ github.event.head_commit.message }}
          files: 学程-win-x64.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: 学程-win-x64
          path: publish/
